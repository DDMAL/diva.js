name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install

      - name: Install Elm globally
        run: npm install -g elm

      - name: Verify package version matches tag
        run: >
          node -e "const v=require('./package.json').version; const t=process.env.GITHUB_REF_NAME.replace(/^v/, ''); if (v !== t) { console.error('package.json version ' + v + ' does not match tag ' + process.env.GITHUB_REF_NAME); process.exit(1); }"

      - name: Build
        run: make build

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
